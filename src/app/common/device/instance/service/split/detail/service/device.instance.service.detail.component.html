<nz-card
  [nzBodyStyle]="{ padding: 0}"
>
  <div class="title-bar">
    <nz-space class="title">
      <span *nzSpaceItem><span nz-icon nzType="database" nzTheme="outline"></span></span>
      <span *nzSpaceItem>Service Detail</span>
    </nz-space>

    @if (lifecycle === LifeCycle.DEVELOPMENT) {
      <span style="float: right">
        <button nz-button nzType="primary" nzDanger nzSize="small" (click)="onRemoved()" type="button">Remove</button>
      </span>
    }
  </div>

  <form class="content" nz-form [formGroup]="form">
    <nz-form-item nz-flex>
      <nz-form-label [style.width.px]="120" nzRequired>Instance ID</nz-form-label>
      <nz-form-control>
        <device-instance-id
          formControlName="iid"
          [lifecycle]="lifecycle"
          (changed)="onIIDChanged()"
        ></device-instance-id>
      </nz-form-control>
    </nz-form-item>

    <nz-form-item nz-flex>
      <nz-form-label [style.width.px]="120" nzRequired>Namespace</nz-form-label>
      <nz-form-control>
        <device-instance-namespace formControlName="ns"></device-instance-namespace>
      </nz-form-control>
    </nz-form-item>

    <nz-form-item nz-flex>
      <nz-form-label [style.width.px]="120" nzRequired>Symbol</nz-form-label>
      <nz-form-control>
        <device-instance-name
          formControlName="code"
          [lifecycle]="lifecycle"
          [updatable]="updatable"
          (changed)="onCodeChanged()"
        ></device-instance-name>
      </nz-form-control>
    </nz-form-item>

    <nz-form-item nz-flex>
      <nz-form-label [style.width.px]="120" nzRequired>Description</nz-form-label>
      <nz-form-control>
        <device-instance-description
          formControlName="description"
          [lifecycle]="lifecycle"
          (changed)="onDescriptionChanged()"
        ></device-instance-description>
      </nz-form-control>
    </nz-form-item>
  </form>
</nz-card>
