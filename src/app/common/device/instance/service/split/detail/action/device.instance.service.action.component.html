<nz-card
  [nzBodyStyle]="{ padding: 0}"
>
  <div class="title-bar">
    <nz-space class="title">
      <span *nzSpaceItem><span nz-icon nzType="thunderbolt" nzTheme="outline"></span></span>
      <span *nzSpaceItem>方法详情</span>
    </nz-space>

    @if (lifecycle === LifeCycle.DEVELOPMENT) {
      <span style="float: right">
        <button nz-button nzType="primary" nzDanger nzSize="small" (click)="onRemoved()" type="button">删除</button>
      </span>
    }
  </div>

  <form class="content" nz-form [formGroup]="form">
    <nz-form-item nz-flex>
      <nz-form-label [style.width.px]="120" nzRequired>实例ID</nz-form-label>
      <nz-form-control>
        <device-instance-id
          formControlName="iid"
          [lifecycle]="lifecycle"
          (changed)="onIIDChanged()"
        ></device-instance-id>
      </nz-form-control>
    </nz-form-item>

    <nz-form-item nz-flex>
      <nz-form-label [style.width.px]="120" nzRequired>名字空间</nz-form-label>
      <nz-form-control>
        <device-instance-namespace formControlName="ns"></device-instance-namespace>
      </nz-form-control>
    </nz-form-item>

    <nz-form-item nz-flex>
      <nz-form-label [style.width.px]="120" nzRequired>代码</nz-form-label>
      <nz-form-control>
        <device-instance-name
          formControlName="code"
          [lifecycle]="lifecycle"
          [updatable]="updatable"
          (changed)="onCodeChanged()"
        ></device-instance-name>
      </nz-form-control>
    </nz-form-item>

    <nz-form-item nz-flex>
      <nz-form-label [style.width.px]="120" nzRequired>描述</nz-form-label>
      <nz-form-control>
        <device-instance-description
          formControlName="description"
          [lifecycle]="lifecycle"
          (changed)="onDescriptionChanged()"
        ></device-instance-description>
      </nz-form-control>
    </nz-form-item>

    <nz-form-item nz-flex>
      <nz-form-label [style.width.px]="120" nzRequired>输入参数</nz-form-label>
      <nz-form-control>
        <device-instance-arguments
          formControlName="argumentsIn"
          [lifecycle]="lifecycle"
          [service]="service"
          [language]="language"
          (changed)="onArgumentsInChanged()"
        ></device-instance-arguments>
      </nz-form-control>
    </nz-form-item>

    <nz-form-item nz-flex>
      <nz-form-label [style.width.px]="120" nzRequired>输出结果</nz-form-label>
      <nz-form-control>
        <device-instance-arguments
          formControlName="argumentsOut"
          [lifecycle]="lifecycle"
          [service]="service"
          [language]="language"
          (changed)="onArgumentsOutChanged()"
        ></device-instance-arguments>
      </nz-form-control>
    </nz-form-item>
  </form>
</nz-card>
