<nz-row [nzGutter]="[8, 8]">
  <nz-col [nzSpan]="24">
    @if (device) {
      <device-instance
        [device]="device"
        [version]="version"
        [language]="language"
        [lifecycle]="LifeCycle.RELEASED"
        (changed)="onChanged($event)"
      ></device-instance>
    }
  </nz-col>
</nz-row>
